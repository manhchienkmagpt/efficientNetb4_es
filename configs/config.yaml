data_root: "D:/chien_duy_thinh_ct7/gan_make_worse/data_training/ffpp_faces_scrfd"
train_dir: "train"
val_dir: "val"
test_dir: "test"
cross_dataset_root: "D:/chien_duy_thinh_ct7/gan_make_worse/data_training/celebdf_faces_scrfd/test"
gan_fake_dir: "F:/DeepFakedata/chien_duy_thinh_output/gan_data/generated_fake_2"
gan_real_dir: "F:/DeepFakedata/chien_duy_thinh_output/gan_data/generated_real"

image_size: 224
batch_size: 16
num_workers: 4
epochs: 30
lr: 1e-4
weight_decay: 1e-4
dropout: 0.4
pretrained: true
backbone: "efficientnetb4"  # options: efficientnetb4, resnet50, swin_tiny, swin_small, esanet, magnet/esanetplus
# Optional advanced model overrides, for example:
# model_kwargs:
#   embed_dim: 512
#   num_heads: 8
original_upsample_factor: 3
train_real_percent: 100  # use 0-100% of original images in train_dir/original
save_dir: "checkpoints_efficientnetb4"
checkpoint_name: "best_efficientnetb4.pth"
gan_save_dir: "checkpoints_efficientnetb4"
gan_checkpoint_name: "best_efficientnetb4_gan.pth"
resume_from: null
seed: 42
threshold: 0.5
device: "cuda"
use_amp: true  # mixed precision (autocast + GradScaler) on CUDA; ignored on CPU

early_stopping_patience: 5
lr_scheduler_patience: 2
lr_scheduler_factor: 0.5
min_lr: 1e-7

use_pos_weight: true   # weight loss by num_real/num_fake to reduce fake-prediction bias
label_smoothing: 0.05  # soft targets: prevents overconfidence on FF++-specific features
